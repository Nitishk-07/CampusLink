*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{

    radial-gradient(circle at 82% 18%,rgba(139,92,246,.18),transparent 30%),

.hidden{display:none!important}
.wrap{width:min(1180px,calc(100% - 32px));margin:0 auto}

.sbtn{padding:13px 20px;border-radius:16px;color:white;font-weight:600;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.11);transition:.18s ease;display:inline-flex;align-items:center;gap:8px}

.dash{padding:30px 0 80px}

.dash-hero::after{content:'';position:absolute;right:-120px;top:-120px;width:360px;height:360px;background:radial-gradient(circle,rgba(99,102,241,.2),transparent 68%);pointer-events:none}
.profile-head{display:flex;align-items:center;gap:22px;position:relative;z-index:1}
.profile-name{font-size:clamp(34px,6vw,60px);line-height:1;letter-spacing:-.06em}
.dash-grid{display:grid;grid-template-columns:1.25fr .75fr;gap:18px;margin-top:18px}

.panel h2{font-size:22px;margin-bottom:12px;letter-spacing:-.03em}
.summary{color:var(--t2);line-height:1.75;font-size:15px}
.meta-list{margin-top:10px}

.badge-row{display:flex;flex-wrap:wrap;gap:7px;margin-top:14px}
.badge{font-size:12px;padding:6px 10px;border-radius:999px;color:#dbeafe;background:rgba(99,102,241,.18);border:1px solid rgba(99,102,241,.22)}

.empty{text-align:center;padding:54px 24px;border-radius:var(--r4);color:var(--t2)}

@media(max-width:960px){.login-grid,.dash-grid{grid-template-columns:1fr;gap:22px}.cards-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.wrap{width:calc(100% - 22px)}.login-card,.setup-card,.dash-hero,.panel{padding:20px;border-radius:22px}.grid2,.cards-grid{grid-template-columns:1fr}.profile-head{flex-direction:column;align-items:flex-start}.toolbar{flex-direction:column;align-items:stretch}.toolbar .inp{max-width:none}}

const esc   = v  => String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const inits = n  => (n||'').split(/\s+/).filter(Boolean).slice(0,2).map(w=>w[0]?.toUpperCase()||'').join('')||'CL';
const normD = u  => (u||'').toLowerCase().replace(/^https?:\/\//,'').replace(/^www\./,'').split('/')[0];
const logoUrl = d => (d && LOGO_DEV_TOKEN) ? `https://img.logo.dev/${encodeURIComponent(d)}?token=${encodeURIComponent(LOGO_DEV_TOKEN)}` : '';

function toast(msg, type='') {
  const el=$('toast');
  el.textContent=msg; el.className=`toast show ${type}`;
  clearTimeout(el._t); el._t=setTimeout(()=>el.className='toast',3200);
}

const loaderHtml = () =>
  `<div class="loader"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;

function renderLogo(name, logo, size=46) {
  const r=Math.round(size*.3), fs=Math.round(size*.32);
  if (logo) return `<img src="${esc(logo)}" class="col-logo" style="width:${size}px;height:${size}px;border-radius:${r}px" onerror="this.outerHTML='<div class=col-fb style=width:${size}px;height:${size}px;border-radius:${r}px;font-size:${fs}px>${esc(inits(name))}</div>'">`;
  return `<div class="col-fb" style="width:${size}px;height:${size}px;border-radius:${r}px;font-size:${fs}px">${esc(inits(name))}</div>`;
}

function avEl(url, name, size=40) {
  if (url) return `<img class="avatar" src="${esc(url)}" alt="${esc(name)}" style="width:${size}px;height:${size}px">`;
  return `<div class="av-fb" style="width:${size}px;height:${size}px;font-size:${Math.round(size*.34)}px">${esc(inits(name))}</div>`;
}

/* ── AI-style summaries ── */
function studentSummary(p) {
  const name=p.preferredName||'This student', major=p.major||'an undecided field';
  const school=p.collegeName||'their university';
  const grad=p.gradYear?`Class of ${p.gradYear}`:'an upcoming graduate';
  const ints=(p.interests||[]).slice(0,4).join(', ')||'learning, growth, and community';
  return `${name} is a ${major} student at ${school} and a member of the ${grad}. Their interests span ${ints}, making them a standout connection for students looking to build real campus community.`;
}

function collegeSummary(c) {
  if (!c) return '';
  const loc=[c.city,c.state].filter(Boolean).join(', ')||'the United States';
  const type=c.ownership?` It is a ${c.ownership.toLowerCase()}.`:'';
  const sz=c.studentSize?` With approximately ${Number(c.studentSize).toLocaleString()} enrolled students, it is a vibrant academic community.`:'';
  const web=c.website?` Visit at ${c.website}.`:'';
  return `${c.name} is located in ${loc}.${type}${sz}${web}`;
}

/* ── College search ── */
async function searchColleges(term) {
  const t=term.trim();
  if (t.length<2) return [];
  if (SCORECARD_KEY) {
    try {
      const p=new URLSearchParams({api_key:SCORECARD_KEY,'school.name':t,per_page:'14',fields:'id,school.name,school.city,school.state,school.school_url,school.ownership,latest.student.size'});
      const r=await fetch(`https://api.data.gov/ed/collegescorecard/v1/schools?${p}`);
      if (r.ok) {
        const d=await r.json();
        return (d.results||[]).map(item=>{
          const domain=normD(item['school.school_url']||'');
          return {id:String(item.id),name:item['school.name']||'Unknown',city:item['school.city']||'',state:item['school.state']||'',website:domain,ownership:OWNERSHIP_MAP[item['school.ownership']]||'',studentSize:item['latest.student.size']||null,logo:logoUrl(domain)};
        });
      }
    } catch {}
  }
  const q=t.toLowerCase();
  return BUILTIN.filter(c=>c.name.toLowerCase().includes(q)||c.city.toLowerCase().includes(q)||c.state.toLowerCase().includes(q)).map(c=>({...c,logo:logoUrl(c.website)}));
}

/* ── Firestore ── */
async function getProfile(uid) {
  try {
    const snap = await getDoc(doc(db,'users',uid));
    return snap.exists() ? snap.data() : null;
  } catch(e) {
    console.warn('getProfile error:', e.code, e.message);
    throw e;
  }
}
async function saveProfile(uid,data) {
  try {
    await setDoc(doc(db,'users',uid),{...data,updatedAt:Date.now()},{merge:true});
  } catch(e) {
    console.error('saveProfile failed:', e.code, e.message);
    if (e.code === 'permission-denied') {
      throw new Error('Firestore permission denied — go to Firebase Console → Firestore → Rules and publish the rules from the setup guide.');
    }
    throw e;
  }
}
async function getCommunity(collegeId) {
  const q=query(collection(db,'users'),where('collegeId','==',collegeId),where('onboardingComplete','==',true));
  const snap=await getDocs(q);
  return snap.docs.map(d=>d.data()).filter(u=>u.uid!==S.user.uid);
}

/* ── Router ── */
async function go(route) {
  S.route=route; S.colResults=[];
  window.scrollTo(0,0);
  if      (route==='loading')   app.innerHTML=loaderHtml();
  else if (route==='login')     renderAuth('signin');
  else if (route==='setup')     { S.step=0; renderSetup(false); }
  else if (route==='dashboard') renderDashboard();
  else if (route==='community') await renderCommunity();
  else if (route==='edit')      prepEdit();
}

/* ── Onboarding / Edit ── */

    </div>`;

  if (step===1) {
    const sel=od.college;
    return `
      <div class="field">
        <label class="lbl">College or university</label>

function renderSetup(isEdit=false) {
  const step=S.step;
  app.innerHTML=`
    ${(S.profile&&isEdit)?navbar():''}
    <section class="setup-wrap">
      <div class="wrap">
        <div class="setup-card glass rise">
          <span class="eyebrow glass" style="display:inline-flex;margin-bottom:16px">Step ${step+1} of ${STEPS.length} · ${STEPS[step]}</span>
          <h1 class="display" style="font-size:clamp(30px,5vw,46px);letter-spacing:-.05em;margin-bottom:8px">
            <span class="gtext">${isEdit?'Edit your profile':'Build your profile'}</span>
          </h1>
          <p class="dim" style="line-height:1.7;font-size:15px">CampusLink uses this to match you with your college community and generate a tailored summary.</p>
          <div class="steps-bar">${STEPS.map((_,i)=>`<div class="step-pill${i<=step?' on':''}"></div>`).join('')}</div>
          ${stepBody()}
          <div class="setup-actions">
            <button class="sbtn" id="backBtn">${step===0?(isEdit?'Cancel':'← Back'):'← Back'}</button>
            <button class="pbtn sm" id="nextBtn">${step===STEPS.length-1?(isEdit?'Save Profile →':'Finish Setup →'):'Next →'}</button>
          </div>
        </div>
      </div>
    </section>`;

  if (S.profile&&isEdit) attachNav();
  wireSetup(isEdit);
}

function syncStep() {
  if (S.step===0) S.od.preferredName=$('pname')?.value.trim()||'';
  if (S.step===2) { S.od.major=$('major')?.value.trim()||''; S.od.gradYear=$('gradyr')?.value.trim()||''; }
}

function validateStep() {
  const {od,step}=S;
  if (step===0&&!od.preferredName)    return 'Enter your preferred name.';
  if (step===1&&!od.college)          return 'Select a college to continue.';
  if (step===2&&!od.major)            return 'Enter your major.';
  if (step===2&&!od.gradYear)         return 'Enter your graduation year.';
  if (step===3&&!od.interests.length) return 'Select at least one interest.';
  return '';
}

/* ── Update only the college results area without re-rendering the whole page ── */
function updateColResults(isEdit) {
  const area = document.getElementById('colResultsArea');
  if (!area) return;
  if (S.colLoading) {
    area.innerHTML = `<p class="muted" style="font-size:13px;padding:8px 0">Searching…</p>`;
    return;
  }
  if (!S.colResults.length) { area.innerHTML = ''; return; }
  area.innerHTML = `
    <div class="col-results glass">
      ${S.colResults.map(c=>`
        <button class="col-row" data-cid="${esc(c.id)}">
          ${renderLogo(c.name,c.logo,46)}
          <div style="min-width:0">
            <p style="font-weight:600">${esc(c.name)}</p>
            <p class="muted" style="font-size:12px">${esc([c.city,c.state].filter(Boolean).join(', '))}${c.ownership?` · ${esc(c.ownership)}`:''}${c.studentSize?` · ${Number(c.studentSize).toLocaleString()} students`:''}</p>
          </div>
        </button>`).join('')}
    </div>`;
  attachColClicks(isEdit);
}

function attachColClicks(isEdit) {
  document.querySelectorAll('[data-cid]').forEach(b => {
    b.addEventListener('click', () => {
      const c = S.colResults.find(x => x.id === b.dataset.cid);
      if (c) {
        S.od.college = c;
        S.colResults = [];
        renderSetup(isEdit); // full re-render only when college is selected
      }
    });
  });
}

function wireSetup(isEdit) {
  $('backBtn').addEventListener('click',()=>{
    if (S.step>0){S.step--;renderSetup(isEdit);}
    else isEdit?go('dashboard'):go('login');
  });

  $('nextBtn').addEventListener('click',async()=>{
    syncStep();
    const err=validateStep();
    if (err){toast(err,'err');return;}
    if (S.step<STEPS.length-1){S.step++;renderSetup(isEdit);return;}
    const btn=$('nextBtn');
    btn.disabled=true; btn.textContent='Saving…';
    try { isEdit?await doEdit():await doOnboarding(); }
    catch(e){
      toast(e.message||'Could not save.','err');
      btn.disabled=false; btn.textContent=isEdit?'Save Profile →':'Finish Setup →';
    }
  });

  const ci=$('colSearch');
  if (ci) {
    ci.addEventListener('input', () => {
      clearTimeout(S.colTimer);
      const val = ci.value;
      if (val.trim().length < 2) {
        S.colResults = [];
        updateColResults(isEdit);
        return;
      }
      S.colTimer = setTimeout(async () => {
        S.colLoading = true;
        updateColResults(isEdit);
        try { S.colResults = await searchColleges(val.trim()); } catch { S.colResults = []; }
        S.colLoading = false;
        updateColResults(isEdit);
      }, 380);
    });
    attachColClicks(isEdit);
  }

  $('changeColl')?.addEventListener('click',()=>{S.od.college=null;renderSetup(isEdit);});

  document.querySelectorAll('[data-int]').forEach(b=>{
    b.addEventListener('click',()=>{
      const set=new Set(S.od.interests),i=b.dataset.int;
      set.has(i)?set.delete(i):set.add(i);
      S.od.interests=Array.from(set);
      renderSetup(isEdit);
    });
  });
}

async function doOnboarding() {
  const {od,user}=S, c=od.college, now=Date.now();
  const profile={
    uid:user.uid, email:user.email||'', preferredName:od.preferredName,
    photoURL:user.photoURL||'',
    collegeId:c.id, collegeName:c.name, collegeCity:c.city,
    collegeState:c.state, collegeWebsite:c.website, collegeLogo:c.logo||'',
    collegeOwnership:c.ownership||'', major:od.major, gradYear:od.gradYear,
    interests:od.interests,
    aiSummary:studentSummary({preferredName:od.preferredName,major:od.major,gradYear:od.gradYear,interests:od.interests,collegeName:c.name}),
    collegeSummary:collegeSummary(c),
    onboardingComplete:true, createdAt:now, updatedAt:now,
  };
  await saveProfile(user.uid,profile);
  S.profile=profile;
  toast('Profile created! Welcome 🎓','ok');
  go('dashboard');
}

async function doEdit() {
  const {od,profile,user}=S;
  const c=od.college?.id?od.college:{
    id:profile.collegeId,name:profile.collegeName,city:profile.collegeCity,
    state:profile.collegeState,website:profile.collegeWebsite,
    logo:profile.collegeLogo,ownership:profile.collegeOwnership,studentSize:null,
  };
  const updates={
    preferredName:od.preferredName, collegeId:c.id, collegeName:c.name,
    collegeCity:c.city, collegeState:c.state, collegeWebsite:c.website,
    collegeLogo:c.logo||'', collegeOwnership:c.ownership||'',
    major:od.major, gradYear:od.gradYear, interests:od.interests,
    aiSummary:studentSummary({preferredName:od.preferredName,major:od.major,gradYear:od.gradYear,interests:od.interests,collegeName:c.name}),
    collegeSummary:collegeSummary(c),
    updatedAt:Date.now(),
  };
  await saveProfile(user.uid,updates);
  S.profile={...profile,...updates};
  toast('Profile updated!','ok');
  go('dashboard');
}

function prepEdit() {
  const p=S.profile; S.step=0;
  S.od={
    preferredName:p.preferredName||'',
    college:p.collegeId?{id:p.collegeId,name:p.collegeName,city:p.collegeCity,state:p.collegeState,website:p.collegeWebsite,logo:p.collegeLogo,ownership:p.collegeOwnership,studentSize:null}:null,
    major:p.major||'', gradYear:p.gradYear||'', interests:p.interests||[],
  };
  renderSetup(true);
}

          <div class="panel glass">
            <h2>AI Student Summary</h2>
            <p class="summary">${esc(p.aiSummary||studentSummary(p))}</p>
            <div class="badge-row">${(p.interests||[]).map(i=>`<span class="badge">${esc(i)}</span>`).join('')}</div>
          </div>
          <div class="panel glass">
            <h2>College</h2>
            <div class="sel-college" style="margin:0 0 14px">
              ${renderLogo(p.collegeName,p.collegeLogo,52)}
              <div style="min-width:0">
                <p style="font-weight:600">${esc(p.collegeName)}</p>
                <p class="dim" style="font-size:14px">${esc([p.collegeCity,p.collegeState].filter(Boolean).join(', '))}</p>
                ${p.collegeWebsite?`<p class="muted" style="font-size:13px">${esc(p.collegeWebsite)}</p>`:''}
              </div>
            </div>
            <div class="meta-list">
              <div class="meta-row"><span>Major</span><span>${esc(p.major)}</span></div>
              <div class="meta-row"><span>Graduation</span><span>Class of ${esc(p.gradYear)}</span></div>
              <div class="meta-row"><span>School type</span><span>${esc(p.collegeOwnership||'—')}</span></div>
            </div>
          </div>
        </div>

        <div class="dash-grid">
          <div class="panel glass">
            <h2>AI College Summary</h2>
            <p class="summary">${esc(p.collegeSummary||'')}</p>
          </div>
          <div class="panel glass">
            <h2>Quick Actions</h2>
            <div style="display:grid;gap:12px">
              <button class="pbtn" data-r="community">Find Collegemates →</button>
              <button class="sbtn" data-r="edit">Edit Profile</button>
            </div>
          </div>
        </div>

      </div>
    </section>`;
  attachNav();
}

/* ── Community ── */
async function renderCommunity() {
  app.innerHTML=navbar()+loaderHtml(); attachNav();
  try { S.community=await getCommunity(S.profile.collegeId); }
  catch(e){ toast('Could not load community.','err'); S.community=[]; }
  drawCommunity();
}

function drawCommunity() {
  const q=S.commFilter.toLowerCase();
  const list=S.community.filter(u=>{
    if(!q)return true;
    return [u.preferredName,u.major,...(u.interests||[])].join(' ').toLowerCase().includes(q);
  });
  app.innerHTML=`
    ${navbar()}
    <section class="dash">
      <div class="wrap">
        <div class="toolbar">
          <div>
            <h1 class="display" style="font-size:clamp(26px,5vw,42px);letter-spacing:-.04em">
              <span class="gtext">${esc(S.profile.collegeName)}</span> Community
            </h1>
            <p class="dim" style="margin-top:4px;font-size:15px">Students from your college on CampusLink.</p>
          </div>
          <input class="inp" id="commFilter" value="${esc(S.commFilter)}" placeholder="Filter by name, major or interest…">
        </div>
        ${list.length
          ?`<div class="cards-grid">${list.map(studentCard).join('')}</div>`
          :`<div class="empty glass">
              <p style="font-size:46px;margin-bottom:12px">🎓</p>
              <h2>No collegemates yet</h2>
              <p>${esc(S.profile.collegeName)} students who join CampusLink will appear here.</p>
            </div>`}
      </div>
    </section>`;
  attachNav();
  $('commFilter').addEventListener('input',e=>{S.commFilter=e.target.value;drawCommunity();});
}

function studentCard(u) {
  const name=u.preferredName||'Student';
  return `
    <article class="s-card glass">
      <div class="s-top">
        ${avEl(u.photoURL,name,54)}
        <div style="min-width:0">
          <p style="font-weight:600;font-size:15px">${esc(name)}</p>
          <p class="dim" style="font-size:13px">${esc(u.major)} · ${esc(u.gradYear)}</p>
        </div>
      </div>
      <p class="summary" style="font-size:13px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden">${esc(u.aiSummary||studentSummary(u))}</p>
      <div class="badge-row">${(u.interests||[]).slice(0,5).map(i=>`<span class="badge">${esc(i)}</span>`).join('')}</div>
    </article>`;
}

/* ── Auth listener — ONLY handles page refresh / tab restore ── */
onAuthStateChanged(auth, async user => {
  // If route is already set, button click already handled routing — skip
  if (S.route !== 'loading') return;

  S.user = user;

  // No session — show login
  if (!user) { go('login'); return; }

  // Session exists — try to restore
  S.od.preferredName = user.displayName || '';
  try {
    const p = await getProfile(user.uid);
    S.profile = p;
    if (p?.onboardingComplete) {
      // Fully set up — go straight to dashboard
      go('dashboard');
    } else {
      // Has a session but no completed profile yet
      // Show login so they can intentionally sign in rather than auto-dumping into setup
      go('login');
    }
  } catch(e) {
    console.warn('Session restore error:', e.code, e.message);
    S.profile = null;
    go('login');
  }
});
</script>
